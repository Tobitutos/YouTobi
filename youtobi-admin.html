<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOUTOBI — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0f; color: #fff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 4px; color: #e63946; }
.logo span { color: #fff; }

/* LOGIN */
#loginPage {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  background: radial-gradient(ellipse at 50% 0%, #1a0a2e 0%, #0a0a0f 70%);
}
.login-box {
  background: #13131a; border: 1px solid rgba(230,57,70,0.2);
  border-radius: 12px; padding: 40px; width: 100%; max-width: 380px;
}
.login-box .logo { margin-bottom: 6px; }
.login-subtitle { font-size: 12px; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 32px; }
label { display: block; font-size: 11px; letter-spacing: 1px; color: #888; text-transform: uppercase; margin-bottom: 6px; }
input[type=email], input[type=password], input[type=text], input[type=number], textarea, select {
  width: 100%; background: #0a0a0f; border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px; padding: 10px 14px; color: #fff; font-size: 14px;
  font-family: 'Segoe UI', sans-serif; outline: none; transition: border 0.2s;
  margin-bottom: 16px;
}
input:focus, textarea:focus, select:focus { border-color: #e63946; }
textarea { resize: vertical; min-height: 80px; }
select option { background: #13131a; }
.btn {
  width: 100%; background: #e63946; color: #fff; border: none;
  padding: 12px; font-size: 14px; font-weight: 700; letter-spacing: 2px;
  cursor: pointer; border-radius: 6px; font-family: 'Bebas Neue', sans-serif;
  transition: background 0.2s;
}
.btn:hover { background: #c1121f; }
.btn-secondary {
  background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #aaa;
  padding: 8px 16px; font-size: 12px; letter-spacing: 1px; cursor: pointer;
  border-radius: 6px; font-family: 'Bebas Neue', sans-serif; transition: all 0.2s;
}
.btn-secondary:hover { border-color: #e63946; color: #e63946; }
.btn-danger { background: transparent; border: 1px solid rgba(230,57,70,0.3); color: #e63946; padding: 6px 12px; font-size: 11px; letter-spacing: 1px; cursor: pointer; border-radius: 4px; font-family: 'Bebas Neue', sans-serif; transition: all 0.2s; }
.btn-danger:hover { background: rgba(230,57,70,0.1); }
.btn-sm { padding: 6px 14px; font-size: 11px; width: auto; }
.error-msg { color: #e63946; font-size: 12px; margin-bottom: 12px; display: none; }

/* ADMIN PANEL */
#adminPage { display: none; }
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px; background: #13131a;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  position: sticky; top: 0; z-index: 50;
}
.topbar-right { display: flex; align-items: center; gap: 12px; }
.user-badge { font-size: 12px; color: #666; }

.admin-body { padding: 32px; max-width: 1100px; margin: 0 auto; }
.tabs { display: flex; gap: 8px; margin-bottom: 32px; }
.tab {
  padding: 8px 20px; border-radius: 4px; cursor: pointer; font-family: 'Bebas Neue', sans-serif;
  font-size: 14px; letter-spacing: 2px; border: 1px solid rgba(255,255,255,0.1);
  color: #aaa; transition: all 0.15s; background: transparent;
}
.tab.active { background: #e63946; border-color: #e63946; color: #fff; }

.panel { display: none; }
.panel.active { display: block; }

.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.section-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; }

/* FORM CARD */
.form-card {
  background: #13131a; border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px; padding: 24px; margin-bottom: 24px;
  display: none;
}
.form-card.open { display: block; }
.form-card h3 { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; color: #e63946; margin-bottom: 20px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-row.triple { grid-template-columns: 1fr 1fr 1fr; }
.form-actions { display: flex; gap: 10px; margin-top: 4px; }
.form-actions .btn { width: auto; padding: 10px 24px; }

/* CONTENT LIST */
.content-table { width: 100%; border-collapse: collapse; }
.content-table th { font-size: 11px; letter-spacing: 1px; color: #555; text-transform: uppercase; padding: 10px 14px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
.content-table td { padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; vertical-align: middle; }
.content-table tr:hover td { background: rgba(255,255,255,0.02); }
.badge { display: inline-block; font-size: 10px; letter-spacing: 1px; padding: 3px 8px; border-radius: 3px; font-family: 'Bebas Neue', sans-serif; }
.badge-serie { background: rgba(230,57,70,0.15); color: #e63946; border: 1px solid rgba(230,57,70,0.3); }
.badge-pelicula { background: rgba(244,162,97,0.15); color: #f4a261; border: 1px solid rgba(244,162,97,0.3); }

/* EXPANDABLE SEASONS */
.seasons-panel { background: #0d0d14; border-radius: 8px; padding: 16px; margin: 8px 0; border: 1px solid rgba(255,255,255,0.05); }
.seasons-panel h4 { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 2px; color: #888; margin-bottom: 12px; }
.season-block { background: #13131a; border-radius: 6px; padding: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.06); }
.season-block-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.season-block-title { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 2px; color: #e63946; }
.episode-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 12px; }
.episode-row:last-child { border-bottom: none; }
.ep-num-badge { width: 24px; height: 24px; background: rgba(230,57,70,0.15); border-radius: 3px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 11px; color: #e63946; flex-shrink: 0; }
.ep-url { color: #555; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }

.empty-state { text-align: center; padding: 60px 20px; color: #444; }
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 13px; }

.toast {
  position: fixed; bottom: 24px; right: 24px; background: #13131a;
  border: 1px solid rgba(230,57,70,0.4); border-radius: 8px;
  padding: 14px 20px; font-size: 13px; z-index: 9999;
  transform: translateY(80px); opacity: 0; transition: all 0.3s;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-color: rgba(74,222,128,0.4); color: #4ade80; }
.toast.error { border-color: rgba(230,57,70,0.4); color: #e63946; }

.loading { color: #555; font-size: 13px; padding: 20px; text-align: center; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <div class="logo">YOU<span>TOBI</span></div>
    <div class="login-subtitle">Panel de administración</div>
    <div class="error-msg" id="loginError">Email o contraseña incorrectos</div>
    <label>Email</label>
    <input type="email" id="loginEmail" placeholder="tu@email.com" />
    <label>Contraseña</label>
    <input type="password" id="loginPassword" placeholder="••••••••" />
    <button class="btn" onclick="doLogin()">ENTRAR</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPage">
  <div class="topbar">
    <div class="logo">YOU<span>TOBI</span> <span style="font-size:12px;color:#555;font-family:'Segoe UI',sans-serif;letter-spacing:1px;margin-left:8px">ADMIN</span></div>
    <div class="topbar-right">
      <span class="user-badge" id="userEmail"></span>
      <button class="btn-secondary" onclick="doLogout()">SALIR</button>
    </div>
  </div>

  <div class="admin-body">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('contenido')">CONTENIDO</button>
      <button class="tab" onclick="switchTab('episodios')">EPISODIOS</button>
    </div>

    <!-- TAB: CONTENIDO -->
    <div class="panel active" id="tab-contenido">
      <div class="section-header">
        <h2>Series & Películas</h2>
        <button class="btn btn-sm" onclick="toggleForm('formContenido')">+ AGREGAR</button>
      </div>

      <div class="form-card" id="formContenido">
        <h3>Nuevo contenido</h3>
        <div class="form-row">
          <div>
            <label>Título</label>
            <input type="text" id="c_titulo" placeholder="Ej: Galactic War" />
          </div>
          <div>
            <label>Tipo</label>
            <select id="c_tipo">
              <option value="serie">Serie</option>
              <option value="pelicula">Película</option>
            </select>
          </div>
        </div>
        <div>
          <label>Descripción</label>
          <textarea id="c_desc" placeholder="Sinopsis del contenido..."></textarea>
        </div>
        <div class="form-row triple">
          <div>
            <label>Género</label>
            <input type="text" id="c_genero" placeholder="Acción · Sci-Fi" />
          </div>
          <div>
            <label>Año</label>
            <input type="number" id="c_anio" placeholder="2024" />
          </div>
          <div>
            <label>Rating (0-10)</label>
            <input type="number" id="c_rating" placeholder="8.5" step="0.1" min="0" max="10" />
          </div>
        </div>
        <div>
          <label>URL Miniatura (opcional)</label>
          <input type="text" id="c_miniatura" placeholder="https://..." />
        </div>
        <div id="peliculaVideoField" style="display:none">
          <label>URL del Video (Archive.org)</label>
          <input type="text" id="c_video_url" placeholder="https://archive.org/download/.../video.mp4" />
        </div>
        <div class="form-actions">
          <button class="btn btn-sm" onclick="guardarContenido()">GUARDAR</button>
          <button class="btn-secondary" onclick="toggleForm('formContenido')">CANCELAR</button>
        </div>
      </div>

      <div id="listaContenido"><div class="loading">Cargando...</div></div>
    </div>

    <!-- TAB: EPISODIOS -->
    <div class="panel" id="tab-episodios">
      <div class="section-header">
        <h2>Agregar Episodio</h2>
      </div>
      <div class="form-card open">
        <h3>Nuevo episodio</h3>
        <div class="form-row">
          <div>
            <label>Serie</label>
            <select id="e_serie" onchange="cargarTemporadas()">
              <option value="">Seleccionar serie...</option>
            </select>
          </div>
          <div>
            <label>Temporada</label>
            <select id="e_temporada">
              <option value="">Primero seleccioná una serie</option>
            </select>
          </div>
        </div>
        <div style="margin-bottom:12px">
          <button class="btn-secondary" onclick="mostrarNuevaTemporada()" id="btnNuevaTemp">+ Nueva temporada</button>
        </div>
        <div id="nuevaTemporadaForm" style="display:none;background:#0a0a0f;border-radius:6px;padding:14px;margin-bottom:16px;border:1px solid rgba(255,255,255,0.06)">
          <label>Número de temporada</label>
          <input type="number" id="nt_numero" placeholder="1" style="width:120px" />
          <label>Título (opcional)</label>
          <input type="text" id="nt_titulo" placeholder="Temporada 1" />
          <div class="form-actions">
            <button class="btn btn-sm" onclick="crearTemporada()">CREAR TEMPORADA</button>
            <button class="btn-secondary" onclick="document.getElementById('nuevaTemporadaForm').style.display='none'">CANCELAR</button>
          </div>
        </div>
        <div class="form-row triple">
          <div>
            <label>Número episodio</label>
            <input type="number" id="e_numero" placeholder="1" />
          </div>
          <div>
            <label>Título</label>
            <input type="text" id="e_titulo" placeholder="El inicio" />
          </div>
          <div>
            <label>Duración</label>
            <input type="text" id="e_duracion" placeholder="48 min" />
          </div>
        </div>
        <div>
          <label>Descripción</label>
          <textarea id="e_desc" placeholder="Descripción del episodio..." style="min-height:60px"></textarea>
        </div>
        <div>
          <label>URL del Video (Archive.org)</label>
          <input type="text" id="e_video_url" placeholder="https://archive.org/download/.../episodio.mp4" />
        </div>
        <div class="form-actions">
          <button class="btn btn-sm" onclick="guardarEpisodio()">GUARDAR EPISODIO</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://bjrgcwfqeutitkmiqfvn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqcmdjd2ZxZXV0aXRrbWlxZnZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5Mjc3MjcsImV4cCI6MjA5NDUwMzcyN30.Yt_nmhhJ1Bo9cB9yTBKVMMoYtyHF9YPWwPkAWIQll4U';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// LOGIN
async function doLogin() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const { error } = await db.auth.signInWithPassword({ email, password });
  if (error) {
    document.getElementById('loginError').style.display = 'block';
  } else {
    showAdmin();
  }
}

document.getElementById('loginPassword').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogout() {
  await db.auth.signOut();
  document.getElementById('adminPage').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
}

async function checkSession() {
  const { data: { session } } = await db.auth.getSession();
  if (session) showAdmin();
}

function showAdmin() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('adminPage').style.display = 'block';
  db.auth.getUser().then(({ data }) => {
    document.getElementById('userEmail').textContent = data.user?.email || '';
  });
  cargarContenido();
  cargarSeriesParaEpisodios();
}

// TABS
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

function toggleForm(id) {
  document.getElementById(id).classList.toggle('open');
}

// Mostrar campo video solo para películas
document.getElementById('c_tipo').addEventListener('change', function() {
  document.getElementById('peliculaVideoField').style.display = this.value === 'pelicula' ? 'block' : 'none';
});

// TOAST
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

// GUARDAR CONTENIDO
async function guardarContenido() {
  const tipo = document.getElementById('c_tipo').value;
  const data = {
    titulo: document.getElementById('c_titulo').value.trim(),
    tipo,
    descripcion: document.getElementById('c_desc').value.trim(),
    genero: document.getElementById('c_genero').value.trim(),
    anio: parseInt(document.getElementById('c_anio').value) || null,
    rating: parseFloat(document.getElementById('c_rating').value) || null,
    miniatura: document.getElementById('c_miniatura').value.trim() || null,
  };
  if (!data.titulo) return showToast('El título es obligatorio', 'error');

  const { data: contenido, error } = await db.from('contenido').insert(data).select().single();
  if (error) return showToast('Error: ' + error.message, 'error');

  if (tipo === 'pelicula') {
    const url = document.getElementById('c_video_url').value.trim();
    if (url) await db.from('peliculas_video').insert({ contenido_id: contenido.id, url_video: url });
  }

  showToast('✓ Contenido guardado');
  toggleForm('formContenido');
  ['c_titulo','c_desc','c_genero','c_anio','c_rating','c_miniatura','c_video_url'].forEach(id => document.getElementById(id).value = '');
  cargarContenido();
  cargarSeriesParaEpisodios();
}

// CARGAR LISTA
async function cargarContenido() {
  const { data, error } = await db.from('contenido').select('*').order('created_at', { ascending: false });
  const el = document.getElementById('listaContenido');
  if (error || !data?.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">🎬</div><p>No hay contenido todavía. Agregá tu primera serie o película.</p></div>';
    return;
  }
  el.innerHTML = `<table class="content-table">
    <thead><tr><th>Título</th><th>Tipo</th><th>Género</th><th>Año</th><th>Rating</th><th>Acciones</th></tr></thead>
    <tbody>${data.map(c => `
      <tr>
        <td style="font-weight:500">${c.titulo}</td>
        <td><span class="badge badge-${c.tipo}">${c.tipo.toUpperCase()}</span></td>
        <td style="color:#888">${c.genero || '—'}</td>
        <td style="color:#888">${c.anio || '—'}</td>
        <td style="color:#f4a261">${c.rating ? '★ ' + c.rating : '—'}</td>
        <td>
          ${c.tipo === 'serie' ? `<button class="btn-secondary" style="font-size:10px;padding:5px 10px" onclick="verTemporadas('${c.id}','${c.titulo}')">VER TEMPORADAS</button>` : ''}
          <button class="btn-danger" style="margin-left:6px" onclick="eliminarContenido('${c.id}')">ELIMINAR</button>
        </td>
      </tr>
      <tr id="seasons-row-${c.id}" style="display:none">
        <td colspan="6" style="padding:0 14px 14px"><div id="seasons-panel-${c.id}"></div></td>
      </tr>
    `).join('')}</tbody>
  </table>`;
}

async function verTemporadas(contenidoId, titulo) {
  const row = document.getElementById('seasons-row-' + contenidoId);
  if (row.style.display !== 'none') { row.style.display = 'none'; return; }
  row.style.display = 'table-row';
  const panel = document.getElementById('seasons-panel-' + contenidoId);
  panel.innerHTML = '<div class="loading">Cargando temporadas...</div>';

  const { data: temps } = await db.from('temporadas').select('*').eq('contenido_id', contenidoId).order('numero');
  if (!temps?.length) { panel.innerHTML = '<div class="seasons-panel"><p style="color:#555;font-size:12px">Sin temporadas aún. Agregalas desde la pestaña EPISODIOS.</p></div>'; return; }

  let html = '<div class="seasons-panel"><h4>' + titulo + ' — TEMPORADAS</h4>';
  for (const t of temps) {
    const { data: eps } = await db.from('episodios').select('*').eq('temporada_id', t.id).order('numero');
    html += `<div class="season-block">
      <div class="season-block-header">
        <span class="season-block-title">TEMPORADA ${t.numero}${t.titulo ? ' — ' + t.titulo : ''}</span>
        <button class="btn-danger" onclick="eliminarTemporada('${t.id}','${contenidoId}','${titulo}')">ELIMINAR TEMP.</button>
      </div>`;
    if (eps?.length) {
      eps.forEach(ep => {
        html += `<div class="episode-row">
          <div class="ep-num-badge">${ep.numero}</div>
          <span style="flex:1;font-weight:500">${ep.titulo}</span>
          <span style="color:#555;font-size:11px;margin-right:8px">${ep.duracion || ''}</span>
          <span class="ep-url">${ep.url_video}</span>
          <button class="btn-danger" style="margin-left:8px" onclick="eliminarEpisodio('${ep.id}','${contenidoId}','${titulo}')">✕</button>
        </div>`;
      });
    } else {
      html += '<p style="color:#555;font-size:12px;padding:4px 0">Sin episodios</p>';
    }
    html += '</div>';
  }
  html += '</div>';
  panel.innerHTML = html;
}

async function eliminarContenido(id) {
  if (!confirm('¿Eliminar este contenido y todo lo relacionado?')) return;
  const { error } = await db.from('contenido').delete().eq('id', id);
  if (error) return showToast('Error al eliminar', 'error');
  showToast('Contenido eliminado');
  cargarContenido();
}

async function eliminarTemporada(id, contenidoId, titulo) {
  if (!confirm('¿Eliminar esta temporada y todos sus episodios?')) return;
  await db.from('temporadas').delete().eq('id', id);
  showToast('Temporada eliminada');
  verTemporadas(contenidoId, titulo);
}

async function eliminarEpisodio(id, contenidoId, titulo) {
  if (!confirm('¿Eliminar este episodio?')) return;
  await db.from('episodios').delete().eq('id', id);
  showToast('Episodio eliminado');
  verTemporadas(contenidoId, titulo);
}

// EPISODIOS
async function cargarSeriesParaEpisodios() {
  const { data } = await db.from('contenido').select('id,titulo').eq('tipo','serie').order('titulo');
  const sel = document.getElementById('e_serie');
  sel.innerHTML = '<option value="">Seleccionar serie...</option>';
  (data || []).forEach(s => sel.innerHTML += `<option value="${s.id}">${s.titulo}</option>`);
}

async function cargarTemporadas() {
  const serieId = document.getElementById('e_serie').value;
  const sel = document.getElementById('e_temporada');
  if (!serieId) { sel.innerHTML = '<option value="">Primero seleccioná una serie</option>'; return; }
  const { data } = await db.from('temporadas').select('*').eq('contenido_id', serieId).order('numero');
  sel.innerHTML = '<option value="">Seleccionar temporada...</option>';
  (data || []).forEach(t => sel.innerHTML += `<option value="${t.id}">Temporada ${t.numero}${t.titulo ? ' — ' + t.titulo : ''}</option>`);
}

function mostrarNuevaTemporada() {
  const serieId = document.getElementById('e_serie').value;
  if (!serieId) return showToast('Primero seleccioná una serie', 'error');
  document.getElementById('nuevaTemporadaForm').style.display = 'block';
}

async function crearTemporada() {
  const serieId = document.getElementById('e_serie').value;
  const numero = parseInt(document.getElementById('nt_numero').value);
  const titulo = document.getElementById('nt_titulo').value.trim();
  if (!serieId || !numero) return showToast('Seleccioná una serie y poné el número', 'error');
  const { error } = await db.from('temporadas').insert({ contenido_id: serieId, numero, titulo: titulo || null });
  if (error) return showToast('Error: ' + error.message, 'error');
  showToast('✓ Temporada creada');
  document.getElementById('nuevaTemporadaForm').style.display = 'none';
  document.getElementById('nt_numero').value = '';
  document.getElementById('nt_titulo').value = '';
  cargarTemporadas();
}

async function guardarEpisodio() {
  const temporadaId = document.getElementById('e_temporada').value;
  const data = {
    temporada_id: temporadaId,
    numero: parseInt(document.getElementById('e_numero').value),
    titulo: document.getElementById('e_titulo').value.trim(),
    descripcion: document.getElementById('e_desc').value.trim(),
    duracion: document.getElementById('e_duracion').value.trim(),
    url_video: document.getElementById('e_video_url').value.trim(),
  };
  if (!temporadaId) return showToast('Seleccioná una temporada', 'error');
  if (!data.titulo || !data.url_video) return showToast('Título y URL son obligatorios', 'error');
  const { error } = await db.from('episodios').insert(data);
  if (error) return showToast('Error: ' + error.message, 'error');
  showToast('✓ Episodio guardado');
  ['e_numero','e_titulo','e_desc','e_duracion','e_video_url'].forEach(id => document.getElementById(id).value = '');
}

checkSession();
</script>
</body>
